name: Stellar-LumenMint Packages CI

on:
  push:
    paths:
      - "packages/**"
    branches: [main, develop]
  pull_request:
    paths:
      - "packages/**"
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: stellar-lumenmint-packages-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [shared-types, sdk, cli, ai]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: packages/package-lock.json

      - name: Install workspace dependencies
        working-directory: ./packages
        run: npm install

      - name: Type check
        working-directory: ./packages/${{ matrix.package }}
        run: npx tsc --noEmit || echo "::warning::Type check issues found (non-blocking)"

      - name: Run tests
        working-directory: ./packages/${{ matrix.package }}
        run: npm run test --if-present || echo "::warning::No tests configured for ${{ matrix.package }}"

      - name: Build
        working-directory: ./packages/${{ matrix.package }}
        run: npm run build --if-present || echo "::warning::No build configured for ${{ matrix.package }}"
