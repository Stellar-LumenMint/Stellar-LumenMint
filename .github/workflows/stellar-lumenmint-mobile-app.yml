name: Stellar-LumenMint Mobile App CI/CD

on:
  push:
    paths:
      - "mobile-app/**"
      - ".github/workflows/stellar-lumenmint-mobile-app.yml"
    branches: [main, develop]
  pull_request:
    paths:
      - "mobile-app/**"
      - ".github/workflows/stellar-lumenmint-mobile-app.yml"
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: stellar-lumenmint-mobile-app-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./mobile-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect package manager
        id: detect
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> $GITHUB_OUTPUT
            echo "install_cmd=pnpm install --frozen-lockfile" >> $GITHUB_OUTPUT
          elif [ -f package-lock.json ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "install_cmd=npm ci" >> $GITHUB_OUTPUT
          else
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "install_cmd=npm install" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ${{ steps.detect.outputs.manager }}
          cache-dependency-path: |
            mobile-app/pnpm-lock.yaml
            mobile-app/package-lock.json

      - name: Setup pnpm
        if: steps.detect.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: ${{ steps.detect.outputs.install_cmd }}

      - name: Type check
        run: |
          if [ "${{ steps.detect.outputs.manager }}" = "pnpm" ]; then
            pnpm exec tsc --noEmit
          else
            npx tsc --noEmit
          fi || echo "::warning::Type check issues found (non-blocking)"

      - name: Lint (if available)
        run: |
          if [ "${{ steps.detect.outputs.manager }}" = "pnpm" ]; then
            pnpm run lint --if-present || echo "::warning::Lint issues found"
          else
            npm run lint --if-present || echo "::warning::Lint issues found"
          fi

      - name: Run tests (if available)
        run: |
          if [ "${{ steps.detect.outputs.manager }}" = "pnpm" ]; then
            pnpm run test --if-present || echo "::warning::Tests failed"
          else
            npm run test --if-present || echo "::warning::Tests failed"
          fi

      - name: Validate Expo config
        run: |
          if [ "${{ steps.detect.outputs.manager }}" = "pnpm" ]; then
            pnpm exec expo config --type public > /dev/null || echo "::warning::Expo config validation failed"
          else
            npx expo config --type public > /dev/null || echo "::warning::Expo config validation failed"
          fi

      - name: Build web bundle (if available)
        run: |
          if [ "${{ steps.detect.outputs.manager }}" = "pnpm" ]; then
            pnpm run build --if-present || echo "::warning::Build failed"
          else
            npm run build --if-present || echo "::warning::Build failed"
          fi
