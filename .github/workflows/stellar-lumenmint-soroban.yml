name: Stellar-LumenMint Soroban CI

on:
  push:
    paths:
      - "soroban/**"
    branches: [main, develop]
  pull_request:
    paths:
      - "soroban/**"
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: stellar-lumenmint-soroban-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_VERSION: "1.85"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./soroban

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: soroban
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (lint)
        run: cargo clippy --all-targets -- -D warnings || echo "::warning::Clippy warnings found (non-fatal)"

      - name: Build all contracts
        run: |
          for contract in nft_contract marketplace_settlement collection_factory transaction_contract; do
            echo "Building $contract..."
            (cd contracts/$contract && cargo build --release --target wasm32-unknown-unknown) || exit 1
            echo "  $contract built successfully"
          done

      - name: Run tests
        run: cargo test --workspace
